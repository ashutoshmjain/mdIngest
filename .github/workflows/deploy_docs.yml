name: Deploy Documentation

on:
  push:
    branches:
      - master

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install mdbook
        run: cargo install mdbook

      - name: Build User Manual (mdbook)
        run: mdbook build

      - name: Generate API Documentation (cargo doc)
        run: cargo doc --no-deps --document-private-items --bins

      - name: Consolidate Documentation
        run: |
          # Move API docs into a subdirectory of the manual
          mv target/doc book/api
          # Ensure .nojekyll is present at the root
          touch book/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./book
