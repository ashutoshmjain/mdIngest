name: Deploy Documentation

on:
  push:
    branches:
      - master

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install mdbook & Dependencies
        run: |
          cargo install mdbook
          cargo install mdbook-katex

      - name: Build & Install Ingest Preprocessor
        run: cargo install --path .

      - name: Build User Manual (mdbook)
        run: mdbook build

      - name: Generate API Documentation (cargo doc)
        run: cargo doc --no-deps

      - name: Consolidate Documentation
        run: |
          # The mdbook is in ./book
          # The API docs are in ./target/doc
          # Move API docs into a subdirectory of the manual
          mv target/doc book/api
          # Create a redirect or link in the manual to the API docs if needed

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./book
